<section class="time-shell">
	<ng-container *ngIf="noTimesAvailable">
		<div class="state-message default-font">No times available</div>
	</ng-container>

	<div class="time-scroll" role="grid" aria-label="Available times" *ngIf="!noTimesAvailable">

		<ng-container *ngIf="isLoading">
			<div class="state-message default-font">Loading availability…</div>
		</ng-container>

		<ng-container *ngIf="hasError">
			<div class="state-message default-font">Could not load availability. Please try again.</div>
		</ng-container>

		<ng-container *ngIf="!isLoading && !hasError">
			<div
				*ngFor="let slot of slots"
				class="slot default-font"
				[class.hour-mark]="slot.isHourMark"
				[class.booked]="slot.isBooked"
				[class.selected]="isSelected(slot)"
				role="row"
				[attr.aria-label]="slot.label + (slot.isBooked ? ' unavailable' : (isSelected(slot) ? ' selected' : ' available'))"
				(click)="onSlotSelected(slot)"
			>
				<span class="slot-label">{{ slot.label }}</span>
				<div class="slot-center" *ngIf="isSelected(slot)">
					<span class="slot-confirm-text">Confirm time?</span>
					<button
						type="button"
						class="confirm-button"
						aria-label="Confirm selected time"
						(click)="confirmSelection($event)"
					>
						&#10003;
					</button>
				</div>
				<span class="slot-bar" aria-hidden="true"></span>
			</div>
		</ng-container>

	</div>
</section>
