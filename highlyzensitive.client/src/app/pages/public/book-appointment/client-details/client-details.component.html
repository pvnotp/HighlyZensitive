<div class="content-card default-font details-card">
  <form class="details-form" aria-label="Contact information form" [formGroup]="form">
    <div class="field-header">
      <label class="field-label" for="scheduler-name">Name</label>
      <span class="field-helper" [hidden]="!form.controls.name.touched || !!form.controls.name.value?.trim()">Required</span>
    </div>
    <input
      id="scheduler-name"
      class="field-input default-font"
      type="text"
      name="name"
      autocomplete="name"
      formControlName="name"
      (input)="onFormChanged()"
    />

    <div class="field-header">
      <label class="field-label" for="scheduler-email">Email</label>
      <span class="field-helper" [hidden]="!form.controls.email.touched || !!form.controls.email.value?.trim()">Required</span>
    </div>
    <input
      id="scheduler-email"
      class="field-input default-font"
      type="email"
      name="email"
      autocomplete="email"
      formControlName="email"
      (input)="onFormChanged()"
    />

    <div class="field-header">
      <label class="field-label" for="scheduler-phone">Phone Number</label>
      <span class="field-helper" [hidden]="!form.controls.phone.touched || !!form.controls.phone.value?.trim()">Required</span>
    </div>
    <input
      id="scheduler-phone"
      class="field-input default-font"
      type="tel"
      name="phone"
      autocomplete="tel"
      inputmode="numeric"
      formControlName="phone"
      (input)="onPhoneChanged(phoneInput.value)"
      #phoneInput
    />
  </form>
</div>
