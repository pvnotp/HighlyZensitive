# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - highlyzensitive

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: highlyzensitive.client/package-lock.json

      - name: Clean stale build artifacts
        shell: pwsh
        run: |
          if (Test-Path "HighlyZensitive.Server/obj") { Remove-Item -Recurse -Force "HighlyZensitive.Server/obj" }
          if (Test-Path "HighlyZensitive.Server/bin") { Remove-Item -Recurse -Force "HighlyZensitive.Server/bin" }
          if (Test-Path "highlyzensitive.client/obj") { Remove-Item -Recurse -Force "highlyzensitive.client/obj" }
          dotnet clean "HighlyZensitive.Server/HighlyZensitive.Server.csproj" -c Release

      - name: Build Angular client
        shell: pwsh
        run: |
          Set-Location "highlyzensitive.client"
          npm ci
          npm run build

      - name: dotnet publish
        run: dotnet publish "HighlyZensitive.Server/HighlyZensitive.Server.csproj" -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'highlyzensitive'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BCE89BA1A56149D59D3E7ECED320AA45 }}